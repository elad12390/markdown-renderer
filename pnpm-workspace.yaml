catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade

packages:
  - playground
  - docs
  - packages/*
  - examples/*

catalogs:
  cli:
    '@antfu/eslint-config': ^6.6.1
    '@antfu/ni': ^28.0.0
    bumpp: ^10.3.2
    eslint: ^9.39.2
    lint-staged: ^16.2.7
    publint: ^0.3.16
    simple-git-hooks: ^2.13.1
    tsdown: ^0.17.3
    tsx: ^4.21.0
    typescript: ^5.9.3
    vite: ^7.2.7
  rendering:
    '@viz-js/viz': ^3.10.0
    katex: ^0.16.11
    mermaid: ^11.6.0
    rehype-parse: ^9.0.1
    rehype-raw: ^7.0.0
    rehype-sanitize: ^6.0.0
    rehype-stringify: ^10.0.1
    remark-gfm: ^4.0.1
    remark-math: ^6.0.0
    remark-parse: ^11.0.0
    remark-rehype: ^11.1.1
    unified: ^11.0.5
    unist-util-visit: ^5.0.0
  testing:
    '@playwright/test': ^1.59.1
    playwright: ^1.59.1
    vitest: ^4.0.15
  types:
    '@types/node': ^25.0.1
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
